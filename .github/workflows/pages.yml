name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Write browser config
        env:
          SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const supabaseUrl = String(process.env.SUPABASE_URL || '').trim().replace(/\/+$/, '');
          const config = {
            SUPABASE_URL: supabaseUrl,
            SUPABASE_ANON_KEY: String(process.env.SUPABASE_ANON_KEY || '').trim(),
            SUPABASE_PUBLIC_URL: `${supabaseUrl}/storage/v1/object/public`
          };
          fs.writeFileSync('public/config.js', `window.VINTED_CONFIG = ${JSON.stringify(config, null, 2)};\n`);
          NODE

      - name: Add nojekyll marker
        run: touch public/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
